
# Configuração do Banco PostgreSQL
# (defaults para localhost; o container sobrescreve via variáveis de ambiente)

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/oficina}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:oficina}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:oficina}
spring.datasource.driver-class-name=org.postgresql.Driver


# Configuração JPA / Hibernate

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# Porta da aplicação

server.port=8080


# Spring Boot Actuator

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true


# Prometheus (Micrometer)

management.prometheus.metrics.export.enabled=true


# SpringDoc / Swagger

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method
